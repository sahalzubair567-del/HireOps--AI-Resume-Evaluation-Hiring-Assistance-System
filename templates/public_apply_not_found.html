<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Not Found — HireOps</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-slate-50"
    style="font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;"
  >
    <div class="max-w-md w-full px-4">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-3 text-center">
        <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-rose-50 text-rose-600 mb-1">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <circle cx="12" cy="12" r="9" />
            <line x1="9" y1="9" x2="15" y2="15" />
            <line x1="15" y1="9" x2="9" y2="15" />
          </svg>
        </div>
        <h1 class="text-lg font-semibold text-slate-900">Job not found</h1>
        <p class="text-xs text-slate-500">
          The application link you opened is no longer valid. Please contact the recruiter or check the correct job
          link.
        </p>
      </div>
    </div>
  </body>
</html>
