<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In • HireOps</title>

    <!-- Manrope font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
    />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-b from-emerald-50 via-white to-stone-50"
    style="font-family: 'Manrope', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;"
  >
    <div class="max-w-md w-full px-6">
      <div class="flex flex-col items-center mb-8">
        <div
          class="h-12 w-12 rounded-2xl bg-emerald-600 flex items-center justify-center text-white shadow-sm mb-3"
        >
          <i data-lucide="sparkles" class="h-6 w-6"></i>
        </div>
        <h1 class="text-2xl font-semibold text-stone-900">HireOps</h1>
        <p class="text-sm text-stone-500 mt-1">Recruiter workspace</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="space-y-2 mb-4">
            {% for category, message in messages %}
              <div
                class="flex items-center justify-between rounded-lg px-4 py-3 text-sm shadow-sm bg-white border
                  {% if category == 'success' %}border-emerald-200 text-emerald-800
                  {% elif category == 'error' %}border-rose-200 text-rose-800
                  {% else %}border-slate-200 text-slate-800{% endif %}"
              >
                <span>{{ message }}</span>
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <div class="bg-white shadow-sm rounded-3xl p-6 border border-stone-200">
        <h2 class="text-lg font-semibold text-slate-900 mb-1">Welcome Back</h2>
        <p class="text-sm text-stone-500 mb-6">Sign in to manage your hiring.</p>

        <form method="post" action="/login" class="space-y-4">
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-slate-700" for="email">Email</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i data-lucide="mail" class="h-4 w-4"></i>
              </span>
              <input
                id="email"
                name="email"
                type="email"
                required
                class="block w-full rounded-2xl border border-stone-200 bg-stone-50 pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                placeholder="you@example.com"
              />
            </div>
          </div>

          <div class="space-y-1.5">
            <label class="text-sm font-medium text-slate-700" for="password">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                <i data-lucide="lock" class="h-4 w-4"></i>
              </span>
              <input
                id="password"
                name="password"
                type="password"
                required
                class="block w-full rounded-2xl border border-stone-200 bg-stone-50 pl-9 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                placeholder="••••••••"
              />
              <button
                type="button"
                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600"
                onclick="togglePasswordVisibility()"
                aria-label="Toggle password visibility"
              >
                <i data-lucide="eye" class="h-4 w-4" id="password-eye"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-xs text-slate-500">
            <label class="inline-flex items-center gap-2">
              <input
                type="checkbox"
                name="remember"
                class="h-3.5 w-3.5 rounded border-stone-300 text-emerald-600 focus:ring-emerald-500"
              />
              <span>Remember me</span>
            </label>
          </div>

          <button
            type="submit"
            class="w-full inline-flex items-center justify-center gap-2 rounded-2xl bg-stone-900 text-white text-sm font-medium py-2.5 mt-2 shadow-sm hover:bg-stone-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-stone-900"
          >
            <span>Sign In</span>
          </button>
        </form>

        <p class="mt-6 text-xs text-slate-500 text-center">
          Don't have an account?
          <a href="/register" class="font-medium text-emerald-700 hover:text-emerald-800"
            >Sign up</a
          >
        </p>
      </div>
    </div>

    <script>
      function togglePasswordVisibility() {
        const input = document.getElementById("password");
        const eye = document.getElementById("password-eye");
        if (!input || !eye) return;
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        eye.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
